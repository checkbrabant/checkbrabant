<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Interactieve Kaart</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
  
  header {
    padding: 1.5rem;
    background: linear-gradient(135deg,#2f855a,#68d391);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  header img { height: 40px; }
  h1 { margin:0; font-size:2rem; }
  p { margin:0; font-size:1rem; }

  #map { height: calc(100vh - 80px); width: 100%; }
</style>
</head>
<body>
<header>
  <img src="https://via.placeholder.com/40x40?text=CB" alt="CheckBrabant Logo">
  <div>
    <h1>CheckBrabant</h1>
    <p>Interactieve testkaart – vinken wat je hebt bezocht</p>
  </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var map = L.map('map').setView([51.5,5.2],9);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Custom icon met vlag / vink
  var defaultIcon = L.icon({
    iconUrl: 'https://via.placeholder.com/30/ffffff/2f855a?text=%E2%9C%93', // groen vinkje
    iconSize: [30,30],
    iconAnchor: [15,30],
    popupAnchor: [0,-30]
  });

  var uitjes = [
    {name:"Efteling", lat:51.650, lng:5.040, badges:["🎢 Pretpark","🌳 Natuur"], visited:true},
    {name:"Safaripark Beekse Bergen", lat:51.560, lng:5.098, badges:["🌿 Natuur","👨‍👩‍👧‍👦 Kinderen"], visited:false},
    {name:"Biesbosch", lat:51.750, lng:4.850, badges:["🌳 Natuur","🚣 Outdoor"], visited:true}
  ];

  uitjes.forEach(function(u){
    var icon = u.visited ? defaultIcon : L.icon({iconUrl:'https://via.placeholder.com/30/ff0000/ffffff?text=%F0%9F%9A%9A', iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-30]});
    L.marker([u.lat,u.lng], {icon:icon})
      .addTo(map)
      .bindPopup("<b>"+u.name+"</b><br/>" + u.badges.join(" · "))
      .on('click', function(){ alert("Klik op "+u.name+" voor detailpagina"); });
  });
});
</script>
</body>
</html>
