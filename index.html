<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CheckBrabant – Interactieve Kaart</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
 integrity="sha256-sA+o1jS4h2bJ9xQSP+Dy2s7w5xoDibpVf5Np8p+F+Gc=" crossorigin=""/>
<style>
  body { margin:0; font-family: system-ui, sans-serif; }
  header { padding: 1.5rem; background: linear-gradient(135deg,#2f855a,#68d391); color: white; text-align:center;}
  h1 { margin:0; font-size:2rem; }
  #map { height: 80vh; width: 100%; }
</style>
</head>
<body>

<header>
  <h1>CheckBrabant</h1>
  <p>Interactieve testkaart met een paar uitjes</p>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
 integrity="sha256-o9N1j7gF3cNQyT7Qk+f7aFZx5b6GIKCprh8m6cTIKM4=" crossorigin=""></script>
<script>
// Init kaart
var map = L.map('map').setView([51.5, 5.2], 9); // Midden Noord-Brabant

// Tile layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Testuitjes
var uitjes = [
  {name:"Efteling", lat:51.650, lng:5.040, badges:["🎢 Pretpark","🌳 Natuur"]},
  {name:"Safaripark Beekse Bergen", lat:51.560, lng:5.098, badges:["🌿 Natuur","👨‍👩‍👧‍👦 Kinderen"]},
  {name:"Biesbosch", lat:51.750, lng:4.850, badges:["🌳 Natuur","🚣 Outdoor"]},
  {name:"Stedelijk Museum Breda", lat:51.592, lng:4.775, badges:["🏛️ Cultuur","👨‍👩‍👧‍👦 Kinderen"]},
  {name:"Ouwehands Dierenpark", lat:51.984, lng:5.582, badges:["🦁 Dieren","👨‍👩‍👧‍👦 Kinderen"]}
];

// Voeg markers toe
uitjes.forEach(function(u){
  var popupContent = "<strong>"+u.name+"</strong><br/>" + u.badges.join(" · ");
  L.marker([u.lat, u.lng]).addTo(map)
    .bindPopup(popupContent)
    .on('click', function(){ alert("Klik op "+u.name+" voor detailpagina"); });
});
</script>

</body>
</html>
