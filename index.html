<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Professioneel Uitjes Board</title>

<style>
/* Algemene stijl */
body { font-family: 'Inter', system-ui, sans-serif; margin:0; padding:0; background:#f5f7fa; color:#1a202c; }
header { padding:1rem; background:linear-gradient(135deg,#2f855a,#68d391); color:white; text-align:center; }
header h1 { margin:0; font-size:1.8rem; letter-spacing:0.5px; }
header p { margin:0.3rem 0 0; font-size:0.95rem; opacity:0.9; }

.board { display:flex; gap:1rem; padding:1rem; overflow-x:auto; }
.column {
  background:#ffffff; border-radius:12px; padding:1rem; width:300px; flex-shrink:0;
  display:flex; flex-direction:column; box-shadow:0 4px 15px rgba(0,0,0,0.08);
  transition: transform 0.2s;
}
.column:hover { transform: translateY(-2px); }
.column h2 { margin-top:0; margin-bottom:1rem; text-align:center; color:#2f855a; font-size:1.2rem; }

.card {
  background:#ffffff; padding:0.8rem; margin-bottom:1rem; border-radius:12px; cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.08); transition: all 0.25s ease;
  display:flex; flex-direction:column; align-items:center; overflow:hidden;
}
.card:hover { transform:scale(1.03); box-shadow:0 6px 18px rgba(0,0,0,0.12); }
.card img { width:100%; border-radius:8px; margin-bottom:8px; object-fit:cover; height:150px; }
.card .emoji { font-size:28px; margin-bottom:6px; }
.badges { font-size:0.8rem; margin-top:6px; color:#4a5568; text-align:center; display:flex; flex-wrap:wrap; justify-content:center; gap:4px; }
.badge { background:#edfbee; padding:2px 6px; border-radius:6px; font-size:0.75rem; }

.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(72,187,120,0.4);} 70% { box-shadow:0 0 0 15px rgba(72,187,120,0);} 100% { box-shadow:0 0 0 0 rgba(72,187,120,0);} }
.dragging { opacity:0.5; }
</style>
</head>
<body>

<header>
  <h1>CheckBrabant – Jouw Uitjes Board</h1>
  <p>Sleep uitjes tussen Open, To-Do en Check</p>
</header>

<div class="board">
  <div class="column" id="open">
    <h2>Open</h2>
  </div>
  <div class="column" id="todo">
    <h2>To-Do</h2>
  </div>
  <div class="column" id="check">
    <h2>Check</h2>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
// Voorbeeld uitjes data
const uitjes = [
  {name:"Efteling", badges:["Pretpark","Natuur"], img:"https://via.placeholder.com/300x150?text=Efteling", status:"open", emoji:"🎢"},
  {name:"Safaripark Beekse Bergen", badges:["Natuur","Kinderen"], img:"https://via.placeholder.com/300x150?text=Beekse+Bergen", status:"todo", emoji:"🦁"},
  {name:"Biesbosch", badges:["Natuur","Outdoor"], img:"https://via.placeholder.com/300x150?text=Biesbosch", status:"check", emoji:"🌳"},
  {name:"Stedelijk Museum Breda", badges:["Cultuur","Kinderen"], img:"https://via.placeholder.com/300x150?text=Museum", status:"open", emoji:"🏛️"},
  {name:"Ouwehands Dierenpark", badges:["Dieren","Kinderen"], img:"https://via.placeholder.com/300x150?text=Dierenpark", status:"todo", emoji:"🦁"}
];

// Functie om een card te maken
function createCard(u){
  const card = document.createElement('div');
  card.className = 'card';
  if(u.status==="open") card.classList.add('pulse'); // subtiele pulse
  card.innerHTML = `
    <div class="emoji">${u.emoji}</div>
    <img src="${u.img}" alt="${u.name}">
    <b>${u.name}</b>
    <div class="badges">${u.badges.map(b => `<span class="badge">${b}</span>`).join('')}</div>
  `;
  return card;
}

// Voeg kaarten toe aan kolommen
uitjes.forEach(u => {
  const col = document.getElementById(u.status);
  col.appendChild(createCard(u));
});

// Maak kolommen drag & drop
['open','todo','check'].forEach(id=>{
  new Sortable(document.getElementById(id), {
    group: 'board',
    animation: 200,
    ghostClass: 'dragging'
  });
});
</script>

</body>
</html>
