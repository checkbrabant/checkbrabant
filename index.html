<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Gezellige Kaart</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
  
  header {
    padding: 1.5rem;
    background: linear-gradient(135deg,#2f855a,#68d391);
    color: white;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  h1 { margin: 0; font-size: 2rem; }
  p { margin-top: 0.5rem; }

  #map { height: calc(100vh - 120px); width: 100%; border-top-left-radius:12px; border-top-right-radius:12px; overflow:hidden; }

  /* Vriendelijke popups */
  .leaflet-popup-content-wrapper {
    border-radius: 12px;
    background: #fefefe;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .leaflet-popup-content b {
    color: #2f855a;
  }
</style>
</head>

<body>
<header>
  <h1>CheckBrabant</h1>
  <p>Interactieve testkaart met gezellige uitjes</p>
</header>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  var map = L.map('map').setView([51.5, 5.2], 9);

  // Licht vriendelijke tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Testuitjes
  var uitjes = [
    {name:"Efteling", lat:51.650, lng:5.040, badges:["🎢 Pretpark","🌳 Natuur"]},
    {name:"Safaripark Beekse Bergen", lat:51.560, lng:5.098, badges:["🌿 Natuur","👨‍👩‍👧‍👦 Kinderen"]},
    {name:"Biesbosch", lat:51.750, lng:4.850, badges:["🌳 Natuur","🚣 Outdoor"]},
    {name:"Stedelijk Museum Breda", lat:51.592, lng:4.775, badges:["🏛️ Cultuur","👨‍👩‍👧‍👦 Kinderen"]},
    {name:"Ouwehands Dierenpark", lat:51.984, lng:5.582, badges:["🦁 Dieren","👨‍👩‍👧‍👦 Kinderen"]},
    {name:"Nationaal Park De Loonse en Drunense Duinen", lat:51.650, lng:5.000, badges:["🌳 Natuur","🚶‍♂️ Outdoor"]},
    {name:"Ecodrome Tilburg", lat:51.556, lng:5.090, badges:["🦉 Educatief","👨‍👩‍👧‍👦 Kinderen"]},
    {name:"Van Abbemuseum Eindhoven", lat:51.440, lng:5.480, badges:["🏛️ Cultuur"]},
    {name:"Safaripark Beekse Bergen Safari", lat:51.563, lng:5.099, badges:["🦓 Dieren"]},
    {name:"De Efteling Bosrijk", lat:51.651, lng:5.041, badges:["🎢 Pretpark","🌳 Natuur"]}
  ];

  // Voeg markers toe
  uitjes.forEach(function(u){
    var popupContent = "<b>"+u.name+"</b><br/>" + u.badges.join(" · ");
    L.marker([u.lat, u.lng]).addTo(map)
      .bindPopup(popupContent)
      .on('click', function(){ alert("Klik op "+u.name+" voor detailpagina"); });
  });

});
</script>
</body>
</html>
