<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Speelse Kaart</title>

<link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
<style>
html, body { height:100%; margin:0; font-family: system-ui, sans-serif; }
header {
  padding:1.5rem;
  background: linear-gradient(135deg,#2f855a,#68d391);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1rem;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
header img { height:40px; }
h1 { margin:0; font-size:2rem; }
p { margin:0; font-size:1rem; }

#map { height: calc(100vh - 80px); width:100%; }

.marker {
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid white;
  font-size:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.pulse { animation: pulse 2s infinite; box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
.bounce { animation: bounce 1s infinite; }
@keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(255,0,0,0.7);} 70% { box-shadow:0 0 0 15px rgba(255,0,0,0);} 100% { box-shadow:0 0 0 0 rgba(255,0,0,0);} }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
.marker:hover { transform: scale(1.2); transition: transform 0.2s; }

.popup-image { width:100%; border-radius:8px; margin-bottom:5px; }
.badges { font-size:0.9rem; margin-top:4px; }
.mapboxgl-popup-content { animation: popupFade 0.3s ease-out; }
@keyframes popupFade { 0% {opacity:0; transform: translateY(10px);} 100% {opacity:1; transform: translateY(0);} }
</style>
</head>
<body>

<header>
  <img src="https://via.placeholder.com/40x40?text=CB" alt="CheckBrabant Logo">
  <div>
    <h1>CheckBrabant</h1>
    <p>Interactieve speelse kaart – klik op uitjes voor visuals</p>
  </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script>
// Init MapLibre
const map = new maplibregl.Map({
    container: 'map',
    style: {version:8,sources:{},layers:[]},
    center: [5.2, 51.5], // Midden Brabant
    zoom: 9
});

// Focus alleen op Brabant
map.setMaxBounds([
  [4.7, 50.9], // Zuidwest
  [6.0, 51.9]  // Noordoost
]);

// Voeg Carto Light tiles toe
map.on('load', () => {
  map.addSource('carto-light', {
    type: 'raster',
    tiles: ['https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png'],
    tileSize: 256
  });
  map.addLayer({
    id: 'carto-light-layer',
    type: 'raster',
    source: 'carto-light'
  });
});

// Uitjes data
const uitjes = [
  {name:"Efteling", coords:[5.040,51.650], badges:["🎢 Pretpark","🌳 Natuur"], visited:true, emoji:"🎢", img:"https://via.placeholder.com/250x150?text=Efteling"},
  {name:"Safaripark Beekse Bergen", coords:[5.098,51.560], badges:["🌿 Natuur","👨‍👩‍👧‍👦 Kinderen"], visited:false, emoji:"🦁", img:"https://via.placeholder.com/250x150?text=Safaripark"},
  {name:"Biesbosch", coords:[4.850,51.750], badges:["🌳 Natuur","🚣 Outdoor"], visited:true, emoji:"🌳", img:"https://via.placeholder.com/250x150?text=Biesbosch"},
  {name:"Stedelijk Museum Breda", coords:[4.775,51.592], badges:["🏛️ Cultuur","👨‍👩‍👧‍👦 Kinderen"], visited:false, emoji:"🏛️", img:"https://via.placeholder.com/250x150?text=Museum"},
  {name:"Ouwehands Dierenpark", coords:[5.582,51.984], badges:["🦁 Dieren","👨‍👩‍👧‍👦 Kinderen"], visited:true, emoji:"🦁", img:"https://via.placeholder.com/250x150?text=Dierenpark"}
];

// Voeg markers toe
uitjes.forEach(u => {
    const el = document.createElement('div');
    el.className = 'marker';
    el.textContent = u.emoji;
    el.style.backgroundColor = u.visited ? '#00ff00' : '#ff6600';
    if(!u.visited) el.classList.add('pulse','bounce');

    const popup = new maplibregl.Popup({ offset:25 }).setHTML(
        `<img src="${u.img}" class="popup-image">
         <b>${u.name}</b><br/><div class="badges">${u.badges.join(" · ")}</div>`
    );

    new maplibregl.Marker(el)
        .setLngLat(u.coords)
        .setPopup(popup)
        .addTo(map);

    el.addEventListener('click', () => {
        u.visited = !u.visited;
        el.style.backgroundColor = u.visited ? '#00ff00' : '#ff6600';
        if(u.visited) el.classList.remove('pulse','bounce');
        else el.classList.add('pulse','bounce');
    });
});
</script>

</body>
</html>
