<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Speelse Mapbox Kaart</title>

<!-- Mapbox GL JS CSS -->
<link href="https://api.mapbox.com/mapbox-gl-js/v2.16.0/mapbox-gl.css" rel="stylesheet" />
<style>
html, body { height:100%; margin:0; font-family: system-ui, sans-serif; }
header {
  padding:1.5rem;
  background: linear-gradient(135deg,#2f855a,#68d391);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1rem;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
header img { height:40px; }
h1 { margin:0; font-size:2rem; }
p { margin:0; font-size:1rem; }

#map { height: calc(100vh - 80px); width:100%; }

.marker {
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid white;
}
.pulse {
  animation: pulse 2s infinite;
  box-shadow: 0 0 0 0 rgba(255,0,0,0.7);
}
@keyframes pulse {
  0% { box-shadow:0 0 0 0 rgba(255,0,0,0.7); }
  70% { box-shadow:0 0 0 15px rgba(255,0,0,0); }
  100% { box-shadow:0 0 0 0 rgba(255,0,0,0); }
}
.popup-image {
  width:100%;
  border-radius:8px;
  margin-bottom:5px;
}
.badges { font-size:0.9rem; margin-top:4px; }
</style>
</head>
<body>

<header>
  <img src="https://via.placeholder.com/40x40?text=CB" alt="CheckBrabant Logo">
  <div>
    <h1>CheckBrabant</h1>
    <p>Interactieve speelse kaart – klik op uitjes voor visuals</p>
  </div>
</header>

<div id="map"></div>

<!-- Mapbox GL JS -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.16.0/mapbox-gl.js"></script>
<script>
const mapboxToken = 'YOUR_MAPBOX_ACCESS_TOKEN_HIER'; // Zet hier je token

mapboxgl.accessToken = mapboxToken;
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11', // lichte, speelse stijl
    center: [5.2, 51.5],
    zoom: 9
});

// Uitjes data
const uitjes = [
  {name:"Efteling", coords:[5.040,51.650], badges:["🎢 Pretpark","🌳 Natuur"], visited:true, img:"https://via.placeholder.com/250x150?text=Efteling"},
  {name:"Safaripark Beekse Bergen", coords:[5.098,51.560], badges:["🌿 Natuur","👨‍👩‍👧‍👦 Kinderen"], visited:false, img:"https://via.placeholder.com/250x150?text=Safaripark"},
  {name:"Biesbosch", coords:[4.850,51.750], badges:["🌳 Natuur","🚣 Outdoor"], visited:true, img:"https://via.placeholder.com/250x150?text=Biesbosch"},
  {name:"Stedelijk Museum Breda", coords:[4.775,51.592], badges:["🏛️ Cultuur","👨‍👩‍👧‍👦 Kinderen"], visited:false, img:"https://via.placeholder.com/250x150?text=Museum"},
  {name:"Ouwehands Dierenpark", coords:[5.582,51.984], badges:["🦁 Dieren","👨‍👩‍👧‍👦 Kinderen"], visited:true, img:"https://via.placeholder.com/250x150?text=Dierenpark"}
];

// Voeg markers toe
uitjes.forEach(u => {
  const el = document.createElement('div');
  el.className = 'marker';
  el.style.backgroundColor = u.visited ? '#00ff00' : '#ff0000';
  if(!u.visited) el.classList.add('pulse'); // pulserende animatie

  const popup = new mapboxgl.Popup({ offset:25 }).setHTML(
    `<img src="${u.img}" class="popup-image">
     <b>${u.name}</b><br/><div class="badges">${u.badges.join(" · ")}</div>`
  );

  const marker = new mapboxgl.Marker(el)
    .setLngLat(u.coords)
    .setPopup(popup)
    .addTo(map);

  el.addEventListener('click', () => {
    u.visited = !u.visited;
    el.style.backgroundColor = u.visited ? '#00ff00' : '#ff0000';
    if(u.visited) el.classList.remove('pulse');
    else el.classList.add('pulse');
  });
});
</script>

</body>
</html>
