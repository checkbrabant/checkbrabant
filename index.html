<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Speels Uitjes Board</title>

<style>
body { font-family: system-ui, sans-serif; margin:0; padding:0; background:#e6f4ee; }
header {
  padding:1rem; background:linear-gradient(135deg,#2f855a,#68d391); color:white; text-align:center;
}
header h1 { margin:0; }

.board { display:flex; gap:1rem; padding:1rem; overflow-x:auto; }
.column {
  background:#ffffff; border-radius:12px; padding:1rem; width:300px; flex-shrink:0; display:flex; flex-direction:column;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.column h2 { margin-top:0; margin-bottom:1rem; text-align:center; color:#2f855a; }

.card {
  background:#f0fff4; padding:0.8rem; margin-bottom:1rem; border-radius:12px; cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.12); transition: transform 0.2s;
  display:flex; flex-direction:column; align-items:center;
}
.card:hover { transform:scale(1.03); }
.card img { width:100%; border-radius:8px; margin-bottom:5px; }
.badges { font-size:0.8rem; margin-top:4px; text-align:center; color:#2d3748; }
.pulse { animation: pulse 2s infinite; box-shadow:0 0 0 0 rgba(72,187,120,0.6); }
@keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(72,187,120,0.6);} 70% { box-shadow:0 0 0 15px rgba(72,187,120,0);} 100% { box-shadow:0 0 0 0 rgba(72,187,120,0);} }
</style>
</head>
<body>

<header>
  <h1>CheckBrabant – Jouw Uitjes Board</h1>
  <p>Klik en sleep uitjes tussen Open, To-Do en Check</p>
</header>

<div class="board">
  <div class="column" id="open">
    <h2>Open</h2>
  </div>
  <div class="column" id="todo">
    <h2>To-Do</h2>
  </div>
  <div class="column" id="check">
    <h2>Check</h2>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
// Voorbeeld uitjes data
const uitjes = [
  {name:"Efteling", badges:["🎢 Pretpark","🌳 Natuur"], img:"https://via.placeholder.com/250x150?text=Efteling", status:"open", emoji:"🎢"},
  {name:"Safaripark Beekse Bergen", badges:["🌿 Natuur","👨‍👩‍👧‍👦 Kinderen"], img:"https://via.placeholder.com/250x150?text=Beekse+Bergen", status:"todo", emoji:"🦁"},
  {name:"Biesbosch", badges:["🌳 Natuur","🚣 Outdoor"], img:"https://via.placeholder.com/250x150?text=Biesbosch", status:"check", emoji:"🌳"},
  {name:"Stedelijk Museum Breda", badges:["🏛️ Cultuur","👨‍👩‍👧‍👦 Kinderen"], img:"https://via.placeholder.com/250x150?text=Museum", status:"open", emoji:"🏛️"},
  {name:"Ouwehands Dierenpark", badges:["🦁 Dieren","👨‍👩‍👧‍👦 Kinderen"], img:"https://via.placeholder.com/250x150?text=Dierenpark", status:"todo", emoji:"🦁"}
];

// Functie om een card te maken
function createCard(u){
  const card = document.createElement('div');
  card.className = 'card';
  if(u.status==="open") card.classList.add('pulse'); // pulse voor open uitjes
  card.innerHTML = `<div style="font-size:24px;">${u.emoji}</div>
                    <img src="${u.img}" alt="${u.name}">
                    <b>${u.name}</b>
                    <div class="badges">${u.badges.join(" · ")}</div>`;
  return card;
}

// Voeg kaarten toe aan kolommen
uitjes.forEach(u => {
  const col = document.getElementById(u.status);
  col.appendChild(createCard(u));
});

// Maak kolommen drag & drop
['open','todo','check'].forEach(id=>{
  new Sortable(document.getElementById(id), {
    group: 'board', // kan tussen kolommen droppen
    animation: 150,
    ghostClass: 'dragging'
  });
});
</script>

</body>
</html>
