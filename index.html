<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant – Testkaart</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; width: 100%; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([51.5, 5.2], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var uitjes = [
  {name:"Efteling", lat:51.650, lng:5.040},
  {name:"Safaripark Beekse Bergen", lat:51.560, lng:5.098},
  {name:"Biesbosch", lat:51.750, lng:4.850}
];

uitjes.forEach(function(u){
  L.marker([u.lat, u.lng]).addTo(map)
    .bindPopup("<b>"+u.name+"</b>");
});
</script>

</body>
</html>
