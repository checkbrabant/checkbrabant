<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CheckBrabant Test Kaart</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html, body {height:100%; margin:0;}
  #map {height:100%;}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([51.5,5.2],9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

L.marker([51.650,5.040]).addTo(map).bindPopup("Efteling");
L.marker([51.560,5.098]).addTo(map).bindPopup("Safaripark Beekse Bergen");
L.marker([51.750,4.850]).addTo(map).bindPopup("Biesbosch");
</script>
</body>
</html>
